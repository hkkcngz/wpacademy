<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    #editor { font-family: 'Fira Code', monospace; font-size: 14px; resize: none; outline: none; }
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-white">
  <div class="flex flex-col h-screen">
    <div class="flex items-center justify-between px-6 py-3 bg-slate-800 border-b border-slate-700">
      <span class="font-semibold text-white">WP Academy — Playground</span>
      <button onclick="runCode()" class="bg-blue-600 hover:bg-blue-500 text-white text-sm px-4 py-1.5 rounded-lg font-medium transition">▶ Çalıştır</button>
    </div>
    <div class="flex flex-1 overflow-hidden">
      <div class="w-1/2 flex flex-col border-r border-slate-700">
        <div class="px-4 py-2 text-xs text-slate-400 bg-slate-800 border-b border-slate-700">HTML / PHP</div>
        <textarea id="editor" class="flex-1 bg-slate-900 text-green-300 p-4 w-full" placeholder="Kodunu buraya yaz..."><!-- Merhaba Playground! -->
<h1 style="color:royalblue;font-family:sans-serif">WordPress Bootcamp</h1>
<p>Buraya kod yaz ve Çalıştır'a tıkla.</p></textarea>
      </div>
      <div class="w-1/2 flex flex-col">
        <div class="px-4 py-2 text-xs text-slate-400 bg-slate-800 border-b border-slate-700">Çıktı</div>
        <iframe id="output" class="flex-1 bg-white" sandbox="allow-scripts"></iframe>
      </div>
    </div>
  </div>
  <script>
    function runCode() {
      const code = document.getElementById('editor').value;
      const iframe = document.getElementById('output');
      iframe.srcdoc = code;
    }
    runCode();
  </script>
</body>
</html>
