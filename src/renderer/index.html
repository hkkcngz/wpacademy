<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WP Academy — WordPress Bootcamp</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#0ea5e9', dark: '#0284c7', light: '#e0f2fe' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Marked (markdown renderer) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    [x-cloak] { display: none !important; }

    body { font-family: 'Inter', sans-serif; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Sidebar nav item */
    .nav-item { @apply flex flex-nowrap items-center gap-2 px-3 py-2 rounded-lg text-sm text-slate-600 hover:bg-slate-100 hover:text-slate-900 cursor-pointer transition-all duration-150 min-w-0; }
    .nav-item.active { @apply bg-brand-light text-brand font-semibold; }
    .nav-item svg { flex-shrink: 0; }
    .nav-item span, .nav-item > *:not(svg) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }

    /* Week card */
    .week-card { @apply bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all duration-200 p-6 cursor-pointer; }
    .week-card.active { @apply border-brand ring-2 ring-brand/20; }

    /* Day badge */
    .day-card { @apply flex flex-col bg-white rounded-xl border border-slate-100 hover:border-brand/40 shadow-sm hover:shadow-md transition-all p-4 cursor-pointer; }

    /* Section pill */
    .section-pill { @apply inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold transition-all cursor-pointer; }

    /* Content iframe */
    #content-frame { width: 100%; height: 100%; border: none; }

    /* Desc markdown */
    .desc-md h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: .5rem; }
    .desc-md p  { color: #64748b; font-size: 0.9rem; line-height: 1.6; }

    /* Animated loader */
    @keyframes pulse-ring { 0%,100%{opacity:.4} 50%{opacity:1} }
    .loader-dot { animation: pulse-ring 1.2s ease-in-out infinite; }
    .loader-dot:nth-child(2) { animation-delay: .2s; }
    .loader-dot:nth-child(3) { animation-delay: .4s; }
  </style>
</head>

<body class="h-full bg-slate-50 text-slate-900" x-data="app()" x-init="init()" x-cloak>

<div class="flex h-screen overflow-hidden">

  <!-- ═══════════════════════════════════════════
       LEFT SIDEBAR
  ═══════════════════════════════════════════ -->
  <aside class="w-64 flex-shrink-0 bg-white border-r border-slate-100 flex flex-col overflow-hidden">

    <!-- Logo -->
    <div class="px-5 py-5 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-brand rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-sm">W</div>
        <div>
          <div class="font-bold text-slate-900 text-sm leading-tight">WP Academy</div>
          <div class="text-xs text-slate-400">by Hakkı Cengiz</div>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-1">

      <!-- Home -->
      <button class="nav-item w-full text-left flex items-center" :class="{'active': view === 'home'}" @click="view='home'; activeContent=null">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span class="truncate">Ana Sayfa</span>
      </button>

      <!-- Months / Weeks tree -->
      <template x-for="month in lessons" :key="month.id">
        <div>
          <div class="px-3 pt-4 pb-1 text-xs font-semibold uppercase tracking-widest text-slate-400" x-text="month.label"></div>
          <template x-for="week in month.weeks" :key="week.id">
            <div>
              <button class="nav-item w-full text-left flex items-center justify-between"
                :class="{'active': activeWeek && activeWeek.id === week.id && activeMonth && activeMonth.id === month.id}"
                @click="selectWeek(month, week)">
                <span class="flex-1 truncate" x-text="week.label"></span>
                <svg class="w-3 h-3 flex-shrink-0 transition-transform" :class="{'rotate-90': activeWeek && activeWeek.id === week.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </button>
            </div>
          </template>
        </div>
      </template>

      <!-- Extras section -->
      <div class="pt-4">
        <div class="px-3 pb-1 text-xs font-semibold uppercase tracking-widest text-slate-400">Extras</div>
        <template x-for="extra in extras" :key="extra.id">
          <button class="nav-item w-full text-left flex items-center"
            :class="{'active': activeExtra && activeExtra.id === extra.id}"
            @click="openExtra(extra)">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            <span class="truncate" x-text="extra.label"></span>
          </button>
        </template>
      </div>

    </nav>

    <!-- Bottom info -->
    <div class="px-4 py-3 border-t border-slate-100 text-xs text-slate-400">
      WordPress Bootcamp v1.0
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════
       MAIN AREA
  ═══════════════════════════════════════════ -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- TOP BAR -->
    <header class="bg-white border-b border-slate-100 px-6 py-3 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-2 text-sm text-slate-500">
        <span class="font-medium text-slate-800" x-text="breadcrumb"></span>
      </div>
      <div class="flex items-center gap-2">
        <template x-if="activeContent">
          <button @click="activeContent=null; view=lastView"
            class="text-xs text-slate-500 hover:text-slate-800 flex items-center gap-1 px-3 py-1.5 rounded-lg hover:bg-slate-100 transition cursor-pointer">
            ← İçerikten Çık
          </button>
        </template>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <div class="flex-1 overflow-hidden relative">

      <!-- Loading -->
      <div x-show="loading" class="absolute inset-0 flex items-center justify-center bg-slate-50 z-10">
        <div class="flex gap-2">
          <div class="loader-dot w-3 h-3 rounded-full bg-brand"></div>
          <div class="loader-dot w-3 h-3 rounded-full bg-brand"></div>
          <div class="loader-dot w-3 h-3 rounded-full bg-brand"></div>
        </div>
      </div>

      <!-- ── HOME VIEW ── -->
      <div x-show="view === 'home' && !activeContent" class="h-full overflow-y-auto px-8 py-8">
        <!-- Hero -->
        <div class="mb-10">
          <h1 class="text-4xl font-extrabold text-slate-900 leading-tight">WordPress <span class="text-brand">Bootcamp</span></h1>
          <p class="text-slate-500 mt-2 text-lg">1 Aylık Kapsamlı Eğitim Programı · by <span class="font-semibold text-slate-700">Hakkı Cengiz</span></p>
        </div>

        <!-- Month sections -->
        <template x-for="month in lessons" :key="month.id">
          <div class="mb-10">
            <h2 class="text-xl font-bold text-slate-800 mb-4" x-text="month.label"></h2>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">

              <!-- Week info card -->
              <template x-for="week in month.weeks" :key="week.id">
                <div class="week-card" :class="{'active': activeWeek && activeWeek.id === week.id}" @click="selectWeek(month, week); view='week'">
                  <div class="text-brand text-xs font-semibold uppercase tracking-widest mb-2" x-text="week.label"></div>
                  <template x-if="week.desc">
                    <div class="desc-md text-slate-600 text-sm leading-relaxed" x-html="parseDesc(week.desc)"></div>
                  </template>
                  <template x-if="!week.desc">
                    <div class="text-slate-400 text-sm italic">Açıklama ekle → desc.md</div>
                  </template>
                  <div class="mt-4 text-xs text-slate-400" x-text="week.days.length + ' gün'"></div>
                </div>
              </template>

            </div>
          </div>
        </template>

        <!-- Extras quick access -->
        <div class="mb-10" x-show="extras.length > 0">
          <h2 class="text-xl font-bold text-slate-800 mb-4">Extras</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <template x-for="extra in extras" :key="extra.id">
              <div class="week-card" @click="openExtra(extra)">
                <div class="text-violet-500 text-xs font-semibold uppercase tracking-widest mb-2">Extra</div>
                <div class="font-semibold text-slate-800" x-text="extra.label"></div>
                <template x-if="extra.desc">
                  <div class="text-slate-400 text-xs mt-1" x-html="parseDesc(extra.desc)"></div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- ── WEEK VIEW ── -->
      <div x-show="view === 'week' && !activeContent" class="h-full overflow-y-auto px-8 py-8">
        <template x-if="activeWeek">
          <div>
            <!-- Week header -->
            <div class="mb-8">
              <div class="text-brand text-xs font-semibold uppercase tracking-widest mb-1" x-text="activeMonth ? activeMonth.label : ''"></div>
              <h2 class="text-3xl font-extrabold text-slate-900" x-text="activeWeek.label"></h2>
              <template x-if="activeWeek.desc">
                <div class="desc-md mt-3 text-slate-600 max-w-2xl" x-html="parseDesc(activeWeek.desc)"></div>
              </template>
            </div>

            <!-- Days grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
              <template x-for="day in activeWeek.days" :key="day.id">
                <div class="day-card group">
                  <div class="text-slate-400 text-xs font-semibold uppercase tracking-widest mb-1" x-text="day.label"></div>
                  <template x-if="day.desc">
                    <div class="text-slate-600 text-sm leading-snug mb-3" x-html="parseDesc(day.desc)"></div>
                  </template>
                  <template x-if="!day.desc">
                    <div class="text-slate-300 text-sm italic mb-3">desc.md ekle</div>
                  </template>

                  <!-- Section pills -->
                  <div class="flex flex-wrap gap-2 mt-auto">
                    <template x-for="section in day.sections" :key="section.id">
                      <button
                        @click.stop="openSection(section)"
                        :disabled="!section.hasContent"
                        class="section-pill"
                        :class="{
                          'bg-blue-50 text-blue-600 hover:bg-blue-100': section.id === 'ders' && section.hasContent,
                          'bg-emerald-50 text-emerald-600 hover:bg-emerald-100': section.id === 'egzersiz' && section.hasContent,
                          'bg-violet-50 text-violet-600 hover:bg-violet-100': section.id === 'odev' && section.hasContent,
                          'bg-slate-100 text-slate-300 cursor-not-allowed': !section.hasContent
                        }"
                        x-text="section.label">
                      </button>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- ── CONTENT IFRAME VIEW ── -->
      <div x-show="activeContent" class="h-full">
        <iframe id="content-frame" :src="activeContent" allowfullscreen></iframe>
      </div>

    </div>
  </main>
</div>

<script>
function app() {
  return {
    // State
    loading: true,
    view: 'home',
    lastView: 'home',
    lessons: [],
    extras: [],
    activeMonth: null,
    activeWeek: null,
    activeExtra: null,
    activeContent: null,

    // Computed breadcrumb
    get breadcrumb() {
      if (this.activeContent) {
        const parts = [];
        if (this.activeMonth) parts.push(this.activeMonth.label);
        if (this.activeWeek) parts.push(this.activeWeek.label);
        if (this.activeExtra) parts.push(this.activeExtra.label);
        return parts.join(' › ') || 'İçerik';
      }
      if (this.view === 'week' && this.activeWeek) {
        return (this.activeMonth?.label || '') + ' › ' + this.activeWeek.label;
      }
      return 'WordPress Bootcamp';
    },

    async init() {
      this.loading = true;
      try {
        this.lessons = await window.wpapi.getLessons();
        this.extras  = await window.wpapi.getExtras();
      } catch(e) {
        console.error('IPC error:', e);
      }
      this.loading = false;
    },

    selectWeek(month, week) {
      this.activeMonth = month;
      this.activeWeek = week;
      this.activeExtra = null;
      this.activeContent = null;
      this.view = 'week';
      this.lastView = 'week';
    },

    async openSection(section) {
      if (!section.hasContent) return;
      const url = await window.wpapi.getFileUrl(section.filePath);
      this.lastView = this.view;
      this.activeContent = url;
    },

    async openExtra(extra) {
      this.activeExtra = extra;
      this.activeWeek = null;
      this.activeMonth = null;
      if (extra.hasContent) {
        const url = await window.wpapi.getFileUrl(extra.filePath);
        this.lastView = this.view;
        this.activeContent = url;
      }
    },

    parseDesc(text) {
      if (!text) return '';
      // Strip h1 heading, just return first paragraph for cards
      const lines = text.split('\n').filter(l => !l.startsWith('#') || l.startsWith('## '));
      return marked.parse(lines.join('\n'));
    },
  };
}
</script>
</body>
</html>
